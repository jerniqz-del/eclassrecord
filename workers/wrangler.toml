name = "admin-reset"
main = "admin-reset-worker.js"
compatibility_date = "2024-01-01"

# Workers KV namespace binding
# Create with: wrangler kv:namespace create OTP_STORE
# Then replace <KV_NAMESPACE_ID> with the output ID
[[kv_namespaces]]
binding = "OTP_STORE"
id = "<KV_NAMESPACE_ID>"

# Routes — update to your workers.dev subdomain or custom domain
# The RESET_WORKER_URL in main.js must match this route
[routes]
pattern = "admin-reset.jerniqz.workers.dev/*"
zone_name = "workers.dev"

# ── Environment Secrets ────────────────────────────────────────
# Set these with: wrangler secret put <NAME>
# NEVER add actual values here — this file is committed to the repo.
#
#   wrangler secret put RESEND_API_KEY
#   wrangler secret put ADMIN_EMAIL          ← jerniqz@gmail.com
#   wrangler secret put JWT_SECRET           ← 32+ random chars
#   wrangler secret put APP_SECRET           ← M-vFFAZhwm0uBiO24dU11-LQ1CLIl08_
#
# Verify secrets are set:
#   wrangler secret list
